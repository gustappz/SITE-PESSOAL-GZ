<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

<body>
    <header>
        <div class="logo">Gustavo Ziterith</div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre Mim</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>

                <li><a href="comandos.html">Comandos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contato">
            <h2>Fale Comigo</h2>
            <p>Se quiser entrar em contato, pode usar o formulário ou acessar minhas redes sociais.</p>

            <form onsubmit="enviarMensagem(event)">
                <div class="campo">
                    <label for="nome">Como você se chama?</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail para resposta:</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="campo">
                    <label for="mensagem">Deixe sua mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5"
                        placeholder="Escreva aqui sobre o que quer conversar..." required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar Mensagem</button>
            </form>

            <div class="redes-sociais">
                <h3>Siga nas Redes Sociais</h3>
                <a href="https://www.instagram.com/gustap2z/" target="_blank" class="instagram-link">Instagram</a>
                <a href="https://github.com/gustappz" target="_blank" class="github-link">GitHub</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; Site do Gustavo Z</p>
    </footer>

    <script src="script.js"></script>
</body>
